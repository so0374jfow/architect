<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architect - Floorplan Designer</title>
  <link rel="stylesheet" href="style.css">

  <!-- Three.js from CDN (no build step) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <!-- Load Three.js as global for renderer-3d.js -->
  <script type="module">
    try {
      const THREE = await import('three');
      const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
      window.THREE = THREE;
      THREE.OrbitControls = OrbitControls;

      // Then load the app
      await import('./app.js');
    } catch (err) {
      document.getElementById('status').textContent = 'Error: ' + err.message;
      document.getElementById('status').style.color = '#f44336';
      console.error('Init error:', err);
    }
  </script>
</head>
<body>

  <div class="header">
    <h1><span>Architect</span> Floorplan Designer</h1>
    <div class="toolbar">
      <button id="btn-demo">Demo</button>
      <button id="btn-clear">Clear</button>
      <button id="btn-load-json">Load</button>
      <button id="btn-save-json">Save JSON</button>
      <button id="btn-share">Share URL</button>
      <button id="btn-export-ifc" class="primary">Export IFC</button>
    </div>
  </div>

  <div class="viewport">
    <div class="panel">
      <div class="panel-label">2D Floorplan</div>
      <canvas id="canvas-2d"></canvas>
    </div>
    <div class="panel">
      <div class="panel-label">3D Preview</div>
      <div id="container-3d"></div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">Ready</span>
    <span id="ws-indicator">-</span>
  </div>

</body>
</html>
